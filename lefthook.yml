commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact --no-banner
    lockfile-verify:
      run: CI=true bun install --frozen-lockfile > /dev/null 2>&1
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    unit-tests:
      run: CI=true bun run test:unit -- --coverage

pre-push:
  commands:
    lockfile-sync:
      run: bun install --lockfile-only --ignore-scripts && git diff --quiet bun.lock
