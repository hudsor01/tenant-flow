pre-commit:
  parallel: true
  commands:
    duplicate-types:
      run: ./scripts/check-duplicate-types.sh
    lockfile-verify:
      run: pnpm install --frozen-lockfile --prefer-offline > /dev/null 2>&1
    lint:
      run: pnpm eslint "apps/frontend/src/**/*.{ts,tsx}" --cache --cache-location node_modules/.cache/eslint/ --no-error-on-unmatched-pattern --no-warn-ignored
    typecheck:
      run: pnpm -r typecheck
    unit-tests:
      run: CI=true pnpm --filter @repo/frontend test:unit
    rls-tests:
      run: pnpm --filter @repo/integration-tests test:rls

pre-push:
  commands:
    lockfile-sync:
      run: pnpm install --lockfile-only --ignore-scripts && git diff --quiet pnpm-lock.yaml
