name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".planning/**"
      - ".vscode/**"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".planning/**"
      - ".vscode/**"
      - "docs/**"
      - "LICENSE"

permissions:
  contents: read

jobs:
  checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: checks-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - name: Suppress git default branch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint & Typecheck
        run: pnpm lint & pnpm typecheck & wait

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: 'placeholder'
          NEXT_PUBLIC_APP_URL: 'https://placeholder.vercel.app'
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_placeholder'

  e2e-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Suppress git default branch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        continue-on-error: true
        run: npx playwright test --config tests/e2e/playwright.config.ts --project=smoke --project=public
        env:
          SKIP_ENV_VALIDATION: 'true'
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
