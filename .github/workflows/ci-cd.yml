name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".planning/**"
      - ".vscode/**"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".planning/**"
      - ".vscode/**"
      - "docs/**"
      - "LICENSE"

permissions:
  contents: read

jobs:
  checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: checks-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - name: Suppress git default branch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & Typecheck
        run: bun run lint & bun run typecheck & wait

      - name: Build
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: 'placeholder'
          NEXT_PUBLIC_APP_URL: 'https://placeholder.vercel.app'
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_placeholder'

  e2e-smoke:
    # Run on every PR and every push to main. Previously the job was
    # gated on push-to-main only (so every PR showed "e2e-smoke skipping"
    # while giving zero actual signal) and `continue-on-error: true`
    # meant even the post-merge run never failed CI.
    #
    # Dependabot handling: Dependabot-triggered runs on pull_request
    # events use the Dependabot secret scope (separate from Actions).
    # Mirroring the 6 E2E secrets into that scope is operationally
    # fragile (rotation drift), so on Dependabot PR events every
    # secret-dependent step short-circuits and the job reports `success`
    # to satisfy required-status-checks.
    #
    # Critical: the guards check BOTH `event_name == 'pull_request'`
    # AND `actor == 'dependabot[bot]'`. The post-merge `push` event to
    # `main` always runs under the Actions secret scope regardless of
    # who triggered the merge — so even when Dependabot's auto-merge
    # finalizes a PR (and `github.actor` on the resulting push event
    # is `dependabot[bot]`), the post-merge run is NOT short-circuited.
    # Only short-circuiting `pull_request` events keeps the post-merge
    # safety net intact.
    #
    # Auto-merge classes (see .github/workflows/dependabot-auto-merge.yml
    # for the full conditional): patches across any ecosystem, minor
    # bumps to direct devDependencies only, and non-major GitHub Actions
    # bumps. All other classes (prod-minor, supabase, stripe, npm
    # majors, GHA majors) flow through manual review.
    #
    # Post-merge CI on main re-executes the full E2E suite under the
    # Actions secret scope so a broken bump fails loud before it can
    # affect any user.
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Skip notice on Dependabot PRs
        if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
        run: |
          echo "::notice::Skipping e2e-smoke on Dependabot PR. Required-status-check satisfied via job success; full suite runs post-merge on main (push event sees Actions secret scope regardless of who triggered the merge)."

      - name: Suppress git default branch hint
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        with:
          fetch-depth: 1

      # Fail hard when any required secret is missing. Same pattern as
      # rls-security-tests.yml — a gate that silently skips is worse
      # than no gate because it masks real problems behind green checks.
      - name: Check required secrets
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        run: |
          missing=()
          [ -z "$OWNER_EMAIL" ]              && missing+=(E2E_OWNER_EMAIL)
          [ -z "$OWNER_PASS" ]               && missing+=(E2E_OWNER_PASSWORD)
          [ -z "$SUPABASE_URL" ]             && missing+=(NEXT_PUBLIC_SUPABASE_URL)
          [ -z "$SUPABASE_PUBLISHABLE_KEY" ] && missing+=(NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub repo secrets: ${missing[*]}"
            echo "::error::Add them in Settings → Secrets and variables → Actions before this gate can pass."
            exit 1
          fi
          echo "All required secrets present"
        env:
          OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          OWNER_PASS: ${{ secrets.E2E_OWNER_PASSWORD }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - uses: oven-sh/setup-bun@v2
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        with:
          node-version: "24"

      - name: Install dependencies
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        run: bunx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        run: bunx playwright test --config tests/e2e/playwright.config.ts --project=smoke --project=public
        env:
          SKIP_ENV_VALIDATION: 'true'
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload Playwright report on failure
        if: failure() && (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]')
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7
