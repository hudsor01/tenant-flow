name: Semgrep

on:
  pull_request: {}
  push:
    branches: [main]
  schedule:
    - cron: '20 17 * * 3' # Wednesday 17:20 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/default
            p/javascript
            p/typescript
            p/react
            p/nextjs
            p/owasp-top-ten
            p/security-audit
            p/xss

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()
