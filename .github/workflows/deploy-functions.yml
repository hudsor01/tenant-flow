name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Deploy a specific function (leave empty for all)'
        required: false
        type: string

concurrency:
  group: deploy-functions-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing+=(SUPABASE_ACCESS_TOKEN)
          [ -z "$SUPABASE_PROJECT_REF" ]  && missing+=(SUPABASE_PROJECT_REF)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub secrets (Settings → Secrets → Actions):"
            printf '   %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All required secrets present"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy functions
        run: |
          if [ -n "$DEPLOY_FUNCTION_NAME" ]; then
            echo "Deploying single function: $DEPLOY_FUNCTION_NAME"
            supabase functions deploy "$DEPLOY_FUNCTION_NAME" --no-verify-jwt
          else
            echo "Deploying all functions..."
            for dir in supabase/functions/*/; do
              fn=$(basename "$dir")
              echo "→ Deploying $fn"
              supabase functions deploy "$fn" --no-verify-jwt || {
                echo "::warning::Failed to deploy $fn"
              }
            done
            echo "All functions deployed"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DEPLOY_FUNCTION_NAME: ${{ inputs.function_name }}
