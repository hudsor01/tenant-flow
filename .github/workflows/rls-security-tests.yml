name: RLS Security Tests

# Primary gate: run on every PR to main (catches RLS drift regardless of changed files).
# Post-merge run on main re-executes the full suite under the Actions secret scope
# so any Dependabot bump that bypassed the PR-level RLS gate (via the step-level
# Dependabot short-circuit) fails loud immediately on merge instead of waiting
# up to a week for the weekly cron.
# Weekly cron is the backup safety net for policy drift between PRs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # Every Monday 09:00 UTC
  workflow_dispatch:

concurrency:
  group: rls-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rls-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Dependabot handling: Dependabot-triggered runs use the Dependabot
    # secret scope (separate from Actions). On Dependabot PRs, every
    # secret-dependent step short-circuits and the job reports `success`
    # to satisfy required-status-checks. The full RLS suite still runs
    # post-merge on main (`push` trigger above), on the weekly Monday
    # cron, and on manual `workflow_dispatch` — so any regression a
    # Dependabot bump introduces fails loud before affecting users.
    # See e2e-smoke comment in ci-cd.yml for the full rationale.
    steps:
      - name: Skip notice on Dependabot PRs
        if: github.actor == 'dependabot[bot]'
        run: |
          echo "::notice::Skipping rls-security on Dependabot PR. Required-status-check satisfied via job success; full suite runs on weekly cron + post-merge on main."

      - name: Suppress git default branch hint
        if: github.actor != 'dependabot[bot]'
        run: git config --global init.defaultBranch main

      - name: Checkout
        if: github.actor != 'dependabot[bot]'
        uses: actions/checkout@v6

      # Fail hard when any required secret is missing. The previous
      # silent-skip pattern made every PR show "rls-security pass" while
      # actually running zero tests — which is how the cycle-4 P0
      # bulk-import bug and the lease_tenants SELECT-policy gap shipped
      # to prod undetected. Mirror the post-deploy-sentry-gate pattern.
      - name: Check required secrets
        if: github.actor != 'dependabot[bot]'
        run: |
          missing=()
          [ -z "$SUPABASE_URL" ]             && missing+=(NEXT_PUBLIC_SUPABASE_URL)
          [ -z "$SUPABASE_PUBLISHABLE_KEY" ] && missing+=(NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY)
          [ -z "$OWNER_A_EMAIL" ]            && missing+=(E2E_OWNER_EMAIL)
          [ -z "$OWNER_A_PASS" ]             && missing+=(E2E_OWNER_PASSWORD)
          [ -z "$OWNER_B_EMAIL" ]            && missing+=(E2E_OWNER_B_EMAIL)
          [ -z "$OWNER_B_PASS" ]             && missing+=(E2E_OWNER_B_PASSWORD)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub repo secrets: ${missing[*]}"
            echo "::error::Add them in Settings → Secrets and variables → Actions before this gate can pass."
            exit 1
          fi
          echo "All required secrets present"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          OWNER_A_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          OWNER_A_PASS: ${{ secrets.E2E_OWNER_PASSWORD }}
          OWNER_B_EMAIL: ${{ secrets.E2E_OWNER_B_EMAIL }}
          OWNER_B_PASS: ${{ secrets.E2E_OWNER_B_PASSWORD }}

      - name: Setup pnpm
        if: github.actor != 'dependabot[bot]'
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        if: github.actor != 'dependabot[bot]'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: github.actor != 'dependabot[bot]'
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run RLS security tests
        if: github.actor != 'dependabot[bot]'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          E2E_OWNER_B_EMAIL: ${{ secrets.E2E_OWNER_B_EMAIL }}
          E2E_OWNER_B_PASSWORD: ${{ secrets.E2E_OWNER_B_PASSWORD }}
        run: pnpm test:integration
